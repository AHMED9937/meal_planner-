<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind2Muscle - Nutrition Plan</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Montserrat:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Watermark Background -->
    <div class="watermark"></div>

    <div class="container">
        <!-- Header Section -->
        <header class="header-section">
            <div class="logo-container">
                <img src="image1_1.jpeg" alt="Mind2Muscle Logo" class="logo" id="main-logo"
                    onerror="this.src='image1_3.png'; if(this.src=='image1_3.png') {this.onerror=function(){this.style.display='none';}}">
            </div>
            <h1 class="main-title" id="plan-title">Nutrition Plan</h1>
            <p class="subtitle" id="plan-subtitle">خطة التغذية المخصصة</p>

            <!-- Global Edit Plan Button -->
            <div class="header-action">
                <a href="manage.html" class="btn btn-primary"><i class="fa-solid fa-gear"></i> إدارة الخطة والبدائل</a>
            </div>
        </header>

        <!-- Dynamic Meals Container -->
        <div class="meals-grid" id="meals-container">
            <!-- Rendered by app.js -->
        </div>

        <div class="extras-grid">
            <!-- Dynamic Rules Section -->
            <div class="card rules-card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <h2 class="section-title">RULES</h2>
                    <i class="fa-solid fa-clipboard-list header-icon"></i>
                </div>
                <div class="card-body">
                    <ul class="rules-items" id="rules-container">
                        <!-- Rendered by app.js -->
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <!-- Data Manager and App Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
